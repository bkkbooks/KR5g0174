front:
  text: 上清元始譜録太真玉訣承十一
  hash: sha256:cb775ec9da20a6dc0dbc2526ce1deae91157a52448bb4ddf228bdcce6f3096bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0174_HFL_000-001a, image: hfl/1039/1039-140.png}
body:
  text: 一名解形逐變流景玉光三惡門第一門名色欲門一名上尸道一名天徒界第二門名愛欲門一名中尸道一名人徒界第三門名貪欲門一名下尸道一名地徒界此三惡之門一名三尸之道一名三徒之界常居人身中塞人三關之口斷人三命之根遏人學仙之路抑人飛騰之魂為學之本而不落尸於三道之上去欲於三界之門真何由降道何由成夫學上法宜遣諸欲滅落尸根道自然降仙自然成剋得飛騰上升三清五道門第一門名色纍苦心門一名太山地獄苦道第二門名愛纍苦神門一名風刀苦道第三門名貪纍苦形門一名擔山負石苦道第四門名華競苦精門一名作江河苦道第五門名身纍衆苦門一名吞火食炭鑊湯苦道此五苦五道之門常居於人身係人命根遏人招真之路斷人修仙之門為學之本而不解形於五道之上滅迹於五苦之下衆纍不斷沉淪罪門何由得脫騰身遁變流景玉光也夫欲上學當先斷諸纍絶滅苦道真自然降神仙自成尅得變形遊宴諸天落上尸之道當青書上元滅欲斬尸變景流光玉符著頭上當於色欲之門北向銜刀請一杯清水面臨水上師於弟子後叩齒九通呪曰上尸青欲自號彭琚變化九種鳥頭蛇軀混沌無心或沉或浮貪欲滋美華色自居走作人魂魄潛司過咎斷人命根氣散神遊放浪三宫小蟲無劬真人甲乙佩籙帶符色欲已斷死路已除元始有命請斬尸頭三台監形速出無留滅根絶種勿使遺餘甲乙練真三宫清虛五帝臨映太一定書北元沐浴冠帶行疇飛度無界流景玉輿遁變上清乘空遨遊畢取所銜刀師以繞弟子頭結九過下所卷玉符埋於色欲門下以杯水灌上行此之道上尸即滅色欲自除身過天徒之界形魂無復苦惱之患太真上道愼勿輕傳以次進中門而落中尸落中尸當黃書中元滅欲斬尸變景流光玉符著心前於愛欲中門向王捉刀向腹請一杯清水著前師於後叩齒十二通呪曰中尸彭質號曰中黃愛欲自居依腹逃藏沉浮變化形無常方執人魂魄走作三宫赤子馳競使人發狂欲性喪神罪由小蟲真人甲乙上帝已徵身佩玉符丹文金章列名元圖三欲已亡元始符命斬滅尸形斷根絶種勿得飛揚甲乙受練五符休糧真仙安鎮藏內生光五帝監映太一列行中元沐浴冠帶衣裳解形遁變流景玉光飛升上清食息太空長保自然天地無窮畢以次進下門而落下尸落下尸當白書下元滅欲斬尸變景流光玉符著兩腳上於下愛欲門向南橫刀於兩足上一杯清水著足下師於後叩齒三通而呪曰下尸彭矯貪欲自榮白色混沌體無常形依人兩足訊動人情言白得失走作魂靈三宫擾亂赤子不寧貪欲小蟲賈備幽冥真人甲乙三練已清欲門斷塞不受邪精元始急令三台臨庭速出無隱及汝弟兄九種子孫一時斬形五帝度真太一記名下元沐浴冠帶羽青玄度三界上飲元精解形𨔡變流景上清飛玄步虛三景齊明畢三界既度便度五苦之道解形𨔡變飛度五道之法當作新衣一通巾履並新於第一色纍苦心門上黑書解形𨔡變滅度地獄流景玉符置兩足下北向平立師叩齒五通呪曰解形𨔡變落尸五難三欲已清神津內灌脫故練新體香氣蘭玉符滅迹地無拘攣身度天界超凌雲端魔王保真氣合自然七祖同升飛步天門五帝監映萬神咸聞畢脫巾解結埋符於兩足下脫履而去次進愛欲苦神門於愛欲苦神門上白書解形𨔡變滅度風刀流景玉符置兩足下西向平立師叩齒七通呪曰雲行飛步𨔡變玉光解形脫迹散髮遨翔人界無拘乘虛空行天魔己保五道開通越度風刀形升上宫畢埋符兩足之下以次進貪欲苦形門已下元闕文出九天門謁刺法用銀木長一尺二寸廣二寸四分讀刺畢埋所屬門下鬱單無量天玉郎門下某帝先生王甲再拜謁禪善無量壽天玉郎門下某帝先生王甲再拜謁梵監天玉郎門下某帝先生王甲再拜謁兜術天玉郎門下某帝先生王甲再拜謁不驕樂天玉郎門下某帝先生王甲再拜謁化應聲天玉郎門下某帝先生王甲再拜謁梵寶天玉郎門下某帝先生王甲再拜謁波梨答惒天玉郎門下某帝先生王甲再拜謁梵摩迦夷天玉郎門下某帝先生王甲再拜謁右九刺以次安之第一清微皇曾天帝位元陽之氣第二禹餘泰明玉完天帝位上陽之氣第三太赤清明何童天帝位太陽之氣第四無量玄胎平育天帝位清陽之氣第五無量壽元明文舉天帝位通陽之氣第六梵監上明七曜天帝位通陽之氣第七兜術虛無越衡天帝位建陽之氣第人不驕樂太極蒙翳天帝位極陽之氣右人天東方元陽之榜以次左行榜下安一燈火合八燈第一化應聲赤明和陽天帝位陽始之氣第二梵寶玄明恭華天帝位陽暉之氣第三魔迦夷耀明宗飄天帝位陽洞之氣第四答惒竺落皇笳天帝位陽明之氣第五褥明虛明堂曜天帝位陽演之氣第六摩褥和觀明端靜天帝位陽明之氣第七憶羅玄明恭慶天帝位陽浩之氣第八那首太焕極瑶天帝位陽極之氣右八天南方陽始之榜次左行榜下安一燈火合八燈第一波梨荼首元載孔升天帝位少隂之氣第二首來太安皇崖天帝位太隂之氣第三首稽那顯定極風天帝位浩隂之氣第四阿那波羅迦始皇孝芒天帝位洞隂之氣第五波羅離和太黃翁重天帝位玄隂之氣第六梵明無思江由天帝位玄隂之氣第七奈濘元上揲阮樂天帝位旻隂之氣第八阿梨惒元極曇誓天帝位極隂之氣右八天西方少隂之榜以次左行榜下安一燈火合八燈第一阿奈皓庭霄度天帝位隂生之氣第二扇明民淵通元洞天帝位化隂之氣第三梨那太文翰寵天帝位隂明之氣第四明梵耐太素禁上天帝位洞隂之氣第五阿尼姤太虛常融天帝位隂靈之氣第六項達泰釋騰勝天帝位隂靈之氣第七大梵項帶大昏龍變天帝位隂浩之氣第八禪蟬自然太極賈奕天帝位隂極之氣右八天北方隂生之榜以次左行榜下安一燈火合八燈四方三十二天榜榜下一燈火以照三十二天受事畢便從東面起一榜便再拜稱名王甲今以生口代形易名過度三惡五道之門不勝形魂受天恩畢以次南三十二榜而受之落上尸之道青書白素著頭上上元滅欲斬尸變景流光玉符落中尸道黃書白素著心前中元滅欲斬尸變景流光玉符落下尸道白書白素著兩足上下元滅欲斬尸變景流光玉符右三符書安如法畢埋著三惡之門水灌上而去解形𨔡變滅度地獄流景玉符黑書白素置兩足下以斷色纍苦心根畢埋門下以解形解形𨔡變滅度風刀流景玉符白書素上置兩足下以斷愛欲苦神根畢埋門下以解形解形𨔡變滅度摙石流景玉符赤書白素置兩足下以斷貪欲苦形根畢埋門下以解形解形𨔡變滅度作江河流景玉符青書素上置兩足下以斷諍競苦精根畢埋門下以解形解形𨔡變滅度吞火食炭流景玉符黃書素上置兩足下以斷身纍衆苦根畢埋門下以解形右五符書如法畢埋五苦道之門受大法解形落尸流景玉光過度三惡五道之中無人代形則三官九府皆不聽人度三界故以人自代開明上天三官訖受五帝領名身即得離三惡之門五苦之中地司不拘形魂升仙代形之人後亦得補三官都書史主者之任依格二百四十年一轉有功亦得上真之任所以代形不得輒以凡醜惡之人貴以應用而已皆須細骨美色柔和小心之人則彼此合法尅得成仙右石鏡水母玉精符黃書員青繒之上置於水中受法者以水自洗濯沐浴玉池身體生光內外受真常能書以浣洗則神明洞達九年自仙也上清元始譜録太真玉訣
